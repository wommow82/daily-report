name: Daily Portfolio Report ver 3.0

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 월~금 14:00 UTC = 앨버타 여름 08:00 / 겨울 07:00
    - cron: '0 17 * * 1-5'   # 월~금 17:00 UTC = 앨버타 여름 11:00 / 겨울 10:00
    - cron: '0 20 * * 1-5'   # 월~금 20:00 UTC = 앨버타 여름 14:00 / 겨울 13:00
  workflow_dispatch: {}       # 수동 실행 가능

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ✅ Ver 3.0 전용 requirements (anthropic 포함)
          if [ -f requirements_ver3.txt ]; then
            pip install -r requirements_ver3.txt
          else
            pip install -r requirements.txt
          fi
          # anthropic 패키지 누락 방지 (명시적 보장)
          pip install "anthropic>=0.25.0"

      - name: Write Google credentials (from Secrets)
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > service_account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$PWD/service_account.json" >> $GITHUB_ENV

      - name: Run report
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python Portfolio_Report_ver_3_0.py

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_id }}
          path: portfolio_daily_report_*.html
